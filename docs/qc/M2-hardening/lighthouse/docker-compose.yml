services:
  php:
    image: php:8.2-fpm-alpine
    container_name: mfp-m2h-php
    working_dir: /var/www/html
    volumes:
      - /root/malang-creative/_active/masfirmanpratama/store:/var/www/html
    command:
      - sh
      - -c
      - |
        apk add --no-cache oniguruma-dev libxml2-dev sqlite-dev &&
        docker-php-ext-install mbstring xml pdo pdo_sqlite bcmath opcache &&
        php-fpm -F
    networks: [m2hnet]

  nginx:
    image: nginx:1.27-alpine
    container_name: mfp-m2h-nginx
    ports:
      - "127.0.0.1:3003:80"
    volumes:
      - /root/malang-creative/_active/masfirmanpratama/store:/var/www/html
      - /root/malang-creative/_active/masfirmanpratama/docs/qc/M2-hardening/lighthouse/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [php]
    networks: [m2hnet]

networks:
  m2hnet: {}
